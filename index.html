 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarBoyz</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 10px; /* bring footer closer */
    }

    .logo-container img {
      width: 480px;
      max-width: 90%;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .logo-container img:hover {
      transform: scale(1.07);
    }

    footer {
      color: #666;
      font-size: 13px;
      margin-top: -5px;  /* pulls footer closer to logo */
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="images/StarBoyzLogoWhiteTrans.png" alt="StarBoyz Logo">
  </div>

  <footer>
    Under Construction 👷🏽‍♂️🏗️ Coming Soon © 2026 · All Rights Reserved · StarBoyzCarter.com
  </footer>

</body>
</html>
